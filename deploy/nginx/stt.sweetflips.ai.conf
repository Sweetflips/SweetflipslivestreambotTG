# Place in /etc/nginx/sites-available/stt.sweetflips.ai and symlink to sites-enabled.
# Replace TLS paths with your certbot output.

upstream stt_relay {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl http2;
    server_name stt.sweetflips.ai;

    ssl_certificate     /etc/letsencrypt/live/stt.sweetflips.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stt.sweetflips.ai/privkey.pem;

    location / {
        proxy_pass http://stt_relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 80;
    server_name stt.sweetflips.ai;
    return 301 https://$host$request_uri;
}
